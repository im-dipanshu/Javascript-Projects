<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chocolate Delight</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="assets/chocolate-bar.png">
  </head>
  <body>

    <header>
      <div class="Navbar" id="Navselect">
        <div class="MenuBox">
          <img
            src="https://cdn-icons-png.flaticon.com/128/12314/12314149.png"
            width="40px"
            height="40px"
            id="Menu"
          />
          <img
            src="assets/chocolate-bar.png"
            id="logo"
          />
          <!-- move tagline here -->
        </div>

        <div id="secondNav">
          <input type="text" placeholder="Search here" id="searchBox" />
          <button id="searchButton">Search</button>
                  <img src="assets/AddCart.png" id="cartImage">
                  <p id="cartQuantity">0</p>
        </div>

      </div>
    </header>
    <div class="SideBar">
      <p class="slection">Home</p>
      <p class="slection">Seen</p>
      <p class="slection">About</p>
      <p class="slection selection1">Contact</p>
    </div>
    <div id="BackdropOuter">
      <div id="Backdrop">
        <!-- <video autoplay muted loop src="piles.mp4"></video> -->
        <video autoplay muted loop src="assets/Cutting.mp4"></video>
        <div id="centerContent">
          <h1 id="tagline">I Love🤩 chocolate!</h1>
          <button type="button" id="shareButton">Share</button>
        </div>
      </div>
    </div>
    <div class="overlay"></div>
    <div id="Search">
      <div id="secondSearch">
        <div id="dairyMilk">
          <img
            src="https://instamart-media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto,h_600/NI_CATALOG/IMAGES/ciw/2026/2/18/fbe5dd08-13e8-4c8d-828e-9f68b5e819cd_B0J3FBMDD6_MN_18022026.png"
            alt="Dairymilk image"
            id="dairyMilkImage"
          />
          <h2 id="dairMilkText">Dairymilk</h2>
          <a id="buyNow">Buy Now</a>
          <a id="addToCart"><img src="assets/AddCart.png" id="cartImage">Add to Cart</a>
        </div>


        <div id="ferreroRocher">
          <img
            src="https://instamart-media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto,h_600/NI_CATALOG/IMAGES/CIW/2026/3/19/fdbab557-7a72-468d-bbf4-73503847c226_1981_1.png"
            alt="cocoa image"
            id="ferreroImage"
          />
          <h2 id="ferreroRocherText">Ferrero rocher</h2>
          <a id="buyNow">Buy Now</a>
          <a id="addToCart"><img src="assets/AddCart.png" id="cartImage">Add to Cart</a>
        </div>
        
        <div id="kitkatCaramel"> 
            <img
              src="https://www.bbassets.com/media/uploads/p/l/40122230_15-nestle-kitkat-crispy-wafer-bar.jpg"
              alt="cocoa image"
              id="kitkatImage"
            />
            <h2 id="kitkatText">kitkat caramel</h2>
            <a id="buyNow">Buy Now</a>
            <a id="addToCart"><img src="assets/AddCart.png" id="cartImage">Add to Cart</a>
        </div>

        <div id="darkChoclate">
          <img
            src="https://www.bbassets.com/media/uploads/p/l/40003735_9-amul-dark-chocolate-55-rich-in-cocoa.jpg"
            alt="Dairymilk image"
            id="darakChoclateImage"
          />
          <h2 id="kitkatText">Amul Chocolate</h2>
          <a id="buyNow">Buy Now</a>
          <a id="addToCart"><img src="assets/AddCart.png" id="cartImage">Add to Cart</a>
        </div>
      </div>

      </div>
    </div>

    <div id="footer">
      <p id="footerText"></p>
    </div>

  </div>
    <!-- <h5 id="hLast">Sloth</h5> -->
    <script src="script.js"></script>
  </body>
</html>
