<!DOCTYPE html>
<html>

<head>
    <title>Calculator</title>
    <style>
        :root {
            --bodyColor1: #1e1e2f;
            /* Done */
            --sideBar1: #2a2a3f;
            /* Done */
            --mainBar1: #252536;
            /* Done */
            --tasks1: #3a3a4f;
            /* Done */
            --borderTasks1: #5c5cff;
            /* Done */
            --text1: #ffffff;
            /* Done */


            --bodyColor2: #f0f4f8;
            --sideBar2: #a3d5ff;
            --mainBar2: #d0f0fd;
            --tasks2: #ffffff;
            --borderTasks2: #7ebfff;
            --text2: #0b1d3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background-color: var(--bodyColor1);
            display: flex;
            align-items: center;
            justify-content: space-around;
            color: var(--text1);
        }

        .sidebar {
            width: 40vh;
            background-color: var(--sideBar1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            height: 90vh;
        }

        .holder {
            padding: 10px;
            font-size: 20px;
            border-radius: 10px;
            max-width: 30vh;
            border: 1px solid black;
        }

        .save {
            padding: 15px;
            border-radius: 10px;
            font-size: 20px;
            border: none;
            transition: all ease 0.5s;
            cursor: pointer;
        }

        .save:hover {
            background-color: #2a2a3f;
            border: 1px solid #1e1e2f;
            transform: translateY(-10px);
            color: #ffffff;
        }

        .main-bar {
            height: 90vh;
            width: 50vh;
            background-color: var(--mainBar1);
            overflow: auto;
            padding: 10px;
        }

        .tasks {
            width: 100%;
            max-width: 40vh;
            background-color: var(--tasks1);
            border: 2px solid var(--borderTasks1);
            margin-top: 10px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            align-items: stretch;
            justify-content: space-around;
            flex-direction: column;
            border-radius: 5px;
            padding: 12px;
            gap: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            cursor: pointer;
        }

        .tasks:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
        }

        .tasks p {
            width: 100%;
            margin: 0;
            overflow-wrap: anywhere;
            font-size: 16px;
            line-height: 1.4;
        }

        .work {
            width: fit-content;
            border-radius: 2px;
            background: linear-gradient(135deg, #7ebfff, #5ca3ff);
            color: #0b1d3a;
            font-size: 14px;
            font-weight: 600;
            align-self: flex-start;
            margin-top: 8px;
            box-shadow: 0 2px 6px rgba(126, 191, 255, 0.3);
            padding-left: 5px;
        }

        img {
            height: 20px;
            width: 20px;

        }

        #myImageButton {
            width: 25px;
            height: 25px;
            display: flex;
            align-self: flex-end;
            position: absolute;
            top: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .tags {
            padding: 10px;
            font-size: 20px;
            border-radius: 10px;
            max-width: 30vh;
            border: 1px solid black;
        }

        h1 {
            position: absolute;
            top: 0px;
        }

        .search-bar {
            padding: 10px;
            border-radius: 5px;
            font-size: large;
            text-transform: capitalize;
        }

        .search-btn {
            padding: 8px;
            border-radius: 5px;

        }
        .navBar{
            width: 100%;
            height: 8vh;
            background-color: #2a2a3f;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            gap: 5px;
        }
        .lineThrough{
            text-decoration: line-through;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h1>Todo List</h1>
        <input type="text" placeholder="Enter the task" class="holder">
        <input type="text" placeholder="Enter the tag" class="tags">
        <button class="save">Add Task</button>
    </div>
    <div class="main-bar">
        <!-- <div class="navBar">
            <input type="text" placeholder="search" class="search-bar">
            <button class="search-btn"><img src="search-solid.svg"></button>
        </div> -->
    </div>

    <script src="script.js">

    </script>
</body>

</html>
